# =============================================
# TecnoCell S.A.C. — Configuracion Spring Boot
# Las credenciales se leen de variables de entorno
# para no exponer datos sensibles en el repositorio.
# =============================================

server.port=8080

# =============================================
# BASE DE DATOS — SUPABASE (Pooler IPv4)
# Configura las variables de entorno antes de ejecutar:
#   DB_URL=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:5432/postgres
#   DB_USER=postgres.cilnbzovlcarnjkiuylh
#   DB_PASS=TuPasswordAqui
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USER:postgres.cilnbzovlcarnjkiuylh}
spring.datasource.password=${DB_PASS:Dany@danyel@}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# CONNECTION POOL (HikariCP)
# =============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=public

# =============================================
# SEGURIDAD JWT
# =============================================
app.jwt.secret=${JWT_SECRET:TecnoCellS3cretK3y2024SuperSeguroParaJWT}
app.jwt.expiration-ms=86400000

# =============================================
# ACTUATOR (solo health — para Docker healthcheck)
# =============================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=8080

# =============================================
# LOGGING
# =============================================
logging.level.com.tecnocell=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
